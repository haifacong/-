{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>入侵检测系统控制面板 (IDS)</title>
    <link rel="stylesheet" href="{% static 'ids/css/style.css' %}">
</head>
<body>

<div class="main-container">
    <!-- 左侧控制面板 -->
    <div class="left-panel">
        <div class="panel-title">入侵检测系统面板</div>

        <!-- 1. 数据集选择 -->
        <div class="card">
            <div class="card-title">1. 数据集选择</div>
            <div class="form-row">
                <label>数据集:</label>
                <select id="dataset">
                    <option value="cicids2017">cicids2017</option>
                    <option value="nsl_kdd">nsl_kdd</option>
                </select>
            </div>
            <div class="form-row">
                <label>数据目录:</label>
                <span class="data-dir-display" id="data-dir-label">./data</span>
            </div>
        </div>

        <!-- 2. 数据预处理 -->
        <div class="card">
            <div class="card-title">2. 数据预处理</div>
            <button class="btn btn-primary" onclick="IDS.preprocess()">开始数据预处理</button>
        </div>

        <!-- 3. 模型训练 -->
        <div class="card">
            <div class="card-title">3. 模型训练</div>
            <div class="form-row">
                <label>模型:</label>
                <select id="model">
                    <option value="cnn">cnn</option>
                    <option value="lstm">lstm</option>
                    <option value="cnn_lstm">cnn_lstm</option>
                </select>
            </div>
            <div class="form-row">
                <label>批量大小:</label>
                <input type="number" id="batch_size" value="64" min="8" max="512">
            </div>
            <div class="form-row">
                <label>训练轮数:</label>
                <input type="number" id="epochs" value="30" min="1" max="100">
            </div>
            <div class="form-row">
                <label>学习率:</label>
                <input type="number" id="lr" value="0.001" min="0.0001" max="0.1" step="0.0001">
            </div>
            <div class="form-row">
                <label>隐藏层维度:</label>
                <input type="number" id="hidden_dim" value="128" min="8" max="512">
            </div>
            <div class="form-row">
                <label>网络层数:</label>
                <input type="number" id="num_layers" value="2" min="1" max="5">
            </div>
            <div class="checkbox-row">
                <input type="checkbox" id="no_cuda">
                <label for="no_cuda">禁用CUDA加速</label>
            </div>
            <button class="btn btn-primary" onclick="IDS.train()">开始训练模型</button>
        </div>

        <!-- 4. 模型评估 -->
        <div class="card">
            <div class="card-title">4. 模型评估</div>
            <button class="btn btn-primary" onclick="IDS.evaluate()">评估模型性能</button>
        </div>

        <!-- 5. 实时流量捕获 -->
        <div class="card">
            <div class="card-title">5. 实时流量捕获</div>
            <div class="form-row">
                <label>捕获时间(秒):</label>
                <input type="number" id="capture_time" value="60" min="10" max="3600">
            </div>
            <button class="btn btn-primary" onclick="IDS.capture()">开始捕获流量</button>
        </div>

        <!-- 6. 威胁检测 -->
        <div class="card">
            <div class="card-title">6. 威胁检测</div>
            <div class="form-row">
                <label>检测模型:</label>
                <select id="detect_model">
                    <option value="cnn">cnn</option>
                    <option value="lstm">lstm</option>
                    <option value="cnn_lstm">cnn_lstm</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="IDS.detect()">开始威胁检测</button>
        </div>
    </div>

    <!-- 右侧面板 -->
    <div class="right-panel">
        <!-- Tab 标签页 -->
        <div class="tab-container">
            <div class="tab-header">
                <button class="tab-btn active" data-tab="tab-capture">📡 流量数据</button>
                <button class="tab-btn" data-tab="tab-detect">⚠️ 检测结果</button>
                <button class="tab-btn" data-tab="tab-visual">📊 可视化</button>
            </div>
            <div class="tab-content">
                <!-- 流量数据 -->
                <div class="tab-pane active" id="tab-capture">
                    <div id="capture-table"><p style="color: var(--color-text-muted)">暂无捕获数据</p></div>
                </div>
                <!-- 检测结果 -->
                <div class="tab-pane" id="tab-detect">
                    <div id="detect-stats"></div>
                    <div id="detect-table"><p style="color: var(--color-text-muted)">暂无检测结果</p></div>
                </div>
                <!-- 可视化 -->
                <div class="tab-pane" id="tab-visual">
                    <div class="image-area" id="image-display">
                        <span class="placeholder">图像将在这里显示</span>
                    </div>
                    <div class="image-buttons">
                        <button class="btn btn-secondary btn-sm" onclick="IDS.showResultImage('confusion_matrix.png')">混淆矩阵</button>
                        <button class="btn btn-secondary btn-sm" onclick="IDS.showResultImage('roc_curve.png')">ROC曲线</button>
                        <button class="btn btn-secondary btn-sm" onclick="IDS.showResultImage('pr_curve.png')">PR曲线</button>
                        <button class="btn btn-secondary btn-sm" onclick="IDS.showResultImage('training_history.png')">训练历史</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 进度条 -->
        <div class="progress-bar-container" id="progress-bar">
            <div class="progress-bar-fill"></div>
        </div>

        <!-- 执行输出 -->
        <div class="output-group">
            <div class="group-title">执行输出</div>
            <div class="output-controls">
                <button class="btn btn-secondary btn-sm" onclick="IDS.clearOutput()">清空输出</button>
                <button class="btn btn-secondary btn-sm" onclick="IDS.exportLog()">导出日志</button>
            </div>
            <div class="output-box" id="output-box"></div>
        </div>

        <!-- 状态栏 -->
        <div class="status-bar status-ready" id="status-bar">就绪 ✓</div>
    </div>
</div>

<script src="{% static 'ids/js/app.js' %}"></script>
</body>
</html>
